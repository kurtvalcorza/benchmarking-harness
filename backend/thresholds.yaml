# Provisional POC thresholds (spec Assumptions; ratified by governance later).
# An unset or `ratified: false` threshold routes the affected verdict to
# pending_adjudication (FR-012b) — it never silently passes.
#
# Tier keys: capability | domain_stress | operational_safety
detection:
  capability:
    # coco_ap_50_95 = COCO AP over IoU 0.50:0.05:0.95 from the pinned
    # pycocotools reference evaluator (metric-evidence.md §Metric identity).
    # The retained diagnostic_precision_recall_product approximation is NEVER
    # bound to a ratified threshold.
    metric: coco_ap_50_95
    minimum: 0.25
    ratified: true
  domain_stress:
    metric: coco_ap_50_95
    minimum: 0.20
    ratified: true
  operational_safety:
    metric: grounding_score
    minimum: 0.30
    ratified: true

classification:
  capability:
    metric: top1
    minimum: 0.60
    ratified: true
  domain_stress:
    metric: top1
    minimum: 0.50
    ratified: true
  operational_safety:
    metric: grounding_score
    minimum: 0.30
    ratified: true

segmentation:
  # miou = semantic mean IoU (segmentation-metric.md). The scorer + slot ship
  # now; the NUMBER is unratified (ratified: false) until governance sets it, so
  # every segmentation run routes to pending_adjudication rather than silently
  # passing/failing on a placeholder threshold (FR-207, FR-012b).
  capability:
    metric: miou
    minimum: 0.50
    ratified: false
  domain_stress:
    metric: miou
    minimum: 0.40
    ratified: false

# pose / lane / face: registered in the benchmark registry but thresholds
# deliberately unset → any run lands in pending_adjudication until governance
# ratifies values (FR-006, FR-012b, FR-025).
