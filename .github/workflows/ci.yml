# T062 — constitution gates (no-restricted-data, no-auto-approval, no-egress)
# run on every push, plus the full backend + frontend suites.
name: ci

on:
  push:
  pull_request:

jobs:
  constitution-gates:
    name: constitution gates (I, II, IV)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "backend[dev]"
      - name: "Gate: no restricted data in tree (Constitution II, T020)"
        run: pytest tests/contract/test_no_restricted_data.py -q
        working-directory: backend
      - name: "Gate: no auto-approval path (Constitution I, T019)"
        run: pytest tests/contract/test_no_auto_approval.py -q
        working-directory: backend
      - name: "Gate: sandboxed runs have no egress (Constitution IV, T067)"
        run: pytest tests/contract/test_sandbox_no_egress.py -q
        working-directory: backend

  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e "backend[dev]"
      - run: ruff check backend
      - run: pytest -q
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
      - run: npm test
        working-directory: frontend
