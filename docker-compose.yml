# T004 — api + worker + redis.
#
# State/data live in BIND MOUNTS (./.state, ./data), not named volumes, because
# the worker launches sandbox containers via the HOST docker daemon
# (/var/run/docker.sock): the daemon resolves bind-mount sources on the host,
# so every path the sandbox needs must exist on the host and be translated via
# HARNESS_HOSTPATH_MAP (see engine/sandbox/runner.py::_host_path).
#
# Register datasets with CONTAINER paths, e.g.:
#   python scripts/seed_demo.py --data-ref /srv/samples/golden/det-golden
#   python scripts/register_golden_set.py --class detection \
#     --data /srv/data/benchmarks/open-images-det-sample --license cc-by-4.0
#
# Windows note (F8): ${PWD} expands to a C:/... path the WSL-hosted daemon
# (Docker/Rancher Desktop) cannot resolve — /c/... silently mounts EMPTY.
# Override HARNESS_HOSTPATH_MAP with daemon-visible /mnt/c/... paths in a
# gitignored docker-compose.override.yml on such hosts.
services:
  # build-only service: gives `docker compose up/build` a reason to produce the
  # sandbox image the worker launches evaluations in (it exits immediately)
  sandbox-image:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    image: benchmarking-harness-sandbox:latest
    command: ["python", "-c", "print('sandbox image built')"]
    restart: "no"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    ports:
      - "8000:8000"
    environment: &harness-env
      HARNESS_REDIS_URL: redis://redis:6379/0
      HARNESS_DATABASE_URL: sqlite:////srv/state/harness.db
      HARNESS_DATA_DIR: /srv/data
      HARNESS_ARTIFACTS_DIR: /srv/state/artifacts
      HARNESS_RESULTS_DIR: /srv/state/results
      # US3: the API enforces this on actual streamed bytes (413 when exceeded).
      # A reverse proxy in front MUST allow at least this much: e.g. nginx
      # `client_max_body_size 2g;` — otherwise the proxy rejects large uploads
      # before the API can stream/hash them. Default 2 GiB.
      HARNESS_MAX_UPLOAD_BYTES: "2147483648"
    volumes:
      - ./.state:/srv/state
      - ./data:/srv/data
    depends_on:
      - redis

  worker:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["python", "-m", "worker.main"]
    environment:
      <<: *harness-env
      # explicit docker mode: fail loudly (infra_ok=false) if the daemon is
      # unusable instead of silently downgrading to the subprocess fallback
      HARNESS_SANDBOX_MODE: docker
      HARNESS_SANDBOX_IMAGE: benchmarking-harness-sandbox:latest
      HARNESS_SANDBOX_WORKDIR: /srv/state/sandbox
      HARNESS_HOSTPATH_MAP: "/srv/backend=${PWD}/backend;/srv/state=${PWD}/.state;/srv/data=${PWD}/data;/srv/samples=${PWD}/samples"
      # US6/T074: in PRODUCTION set HARNESS_RUNNER_URL=http://runner:9000 (+ token)
      # and REMOVE the docker.sock mount below so the worker holds NO host socket;
      # execution then delegates to the `runner` service. The socket mount here is
      # a DEV-ONLY convenience for the zero-dependency in-process path.
      HARNESS_RUNNER_URL: ${HARNESS_RUNNER_URL:-}
      HARNESS_RUNNER_TOKEN: ${HARNESS_RUNNER_TOKEN:-}
    volumes:
      - ./.state:/srv/state
      - ./data:/srv/data
      - /var/run/docker.sock:/var/run/docker.sock  # DEV-ONLY (see runner service; drop in prod)
    depends_on:
      redis:
        condition: service_started
      sandbox-image:
        condition: service_completed_successfully

  # Dedicated runner service (US6/T073/T074): the ONLY component that should hold
  # the container runtime socket. Enabled under the `production` profile:
  #   HARNESS_RUNNER_TOKEN=<secret> docker compose --profile production up -d runner
  # then run api/worker with HARNESS_RUNNER_URL=http://runner:9000 and NO socket
  # mount of their own, so a compromised API/UI tier cannot reach the host daemon.
  runner:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    command: ["uvicorn", "runner.main:app", "--host", "0.0.0.0", "--port", "9000"]
    profiles: ["production"]
    environment:
      <<: *harness-env
      HARNESS_SANDBOX_MODE: docker
      HARNESS_SANDBOX_IMAGE: benchmarking-harness-sandbox:latest
      HARNESS_SANDBOX_WORKDIR: /srv/state/sandbox
      HARNESS_HOSTPATH_MAP: "/srv/backend=${PWD}/backend;/srv/state=${PWD}/.state;/srv/data=${PWD}/data;/srv/samples=${PWD}/samples"
      # Shared secret the worker presents. Enforced by the runner APP, which fails
      # closed (503 on /run) when unset — see runner/main.py. It is NOT a required
      # `:?` compose var: Compose interpolates every service (even profile-disabled
      # ones) before profile filtering, so a `:?` here would abort the default
      # `docker compose up` even though the runner never starts outside the
      # `production` profile. Set it when you run the runner:
      #   HARNESS_RUNNER_TOKEN=<secret> docker compose --profile production up -d runner
      HARNESS_RUNNER_TOKEN: ${HARNESS_RUNNER_TOKEN:-}
      # deliberately NOT set: HARNESS_RUNNER_URL — the runner executes locally
      # (it owns the socket) and must never delegate back to itself.
    ports:
      - "9000:9000"
    volumes:
      - ./.state:/srv/state
      - ./data:/srv/data
      - /var/run/docker.sock:/var/run/docker.sock  # the runner is the socket owner
    depends_on:
      sandbox-image:
        condition: service_completed_successfully

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Feature 002 production dependency (T014a). Enabled only under the
  # `production` profile so the offline SQLite demo stays zero-dependency:
  #   docker compose --profile production up -d postgres redis
  # Then point migrations at it (see specs/002-production-hardening/quickstart.md):
  #   HARNESS_DATABASE_URL=postgresql+psycopg://harness:harness@localhost:5432/harness
  postgres:
    image: postgres:16-alpine
    profiles: ["production"]
    environment:
      POSTGRES_USER: harness
      POSTGRES_PASSWORD: harness
      POSTGRES_DB: harness
    ports:
      - "5432:5432"
    volumes:
      - ./.state/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harness"]
      interval: 5s
      timeout: 5s
      retries: 10
